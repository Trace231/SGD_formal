nted", "depth": 1, "file": "Lib/Glue/Calculus.lean"}, {"id": "norm_sq_sgd_step", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Algebra.lean"}, {"id": "inner_neg_smul_eq", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Algebra.lean"}, {"id": "norm_neg_smul_sq", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Algebra.lean"}, {"id": "proj_nonexp_sq", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Algebra.lean"}, {"id": "integrable_inner_of_sq_integrable", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Probability.lean"}, {"id": "integrable_norm_sq_of_bounded_var", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Probability.lean"}, {"id": "svrg_variance_reduction", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Probability.lean"}, {"id": "measurable_of_lsmooth", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Measurable.lean"}, {"id": "integrable_lsmooth_comp_measurable", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Measurable.lean"}, {"id": "integrable_inner_gradL_comp", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Measurable.lean"}, {"id": "integrable_norm_sq_iterate_comp", "type": "glue", "status": "implemented", "depth": 1, "file": "Lib/Glue/Measurable.lean"}, {"id": "lipschitz_gradient_quadratic_bound", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/GradientFTC.lean"}, {"id": "convex_first_order_condition", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/ConvexFOC.lean"}, {"id": "strong_convex_first_order_condition", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/ConvexFOC.lean"}, {"id": "convex_inner_lower_bound", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/ConvexFOC.lean"}, {"id": "strong_convex_inner_lower_bound", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/ConvexFOC.lean"}, {"id": "expectation_norm_sq_gradL_bound", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/IndepExpect.lean"}, {"id": "expectation_inner_gradL_eq", "type": "layer0", "status": "implemented", "depth": 0, "file": "Lib/Layer0/IndepExpect.lean"}, {"id": "stochastic_descent_nonconvex'", "type": "layer1", "status": "implemented", "depth": 2, "file": "Lib/Layer1/StochasticDescent.lean"}, {"id": "stochastic_descent_convex'", "type": "layer1", "status": "implemented", "depth": 2, "file": "Lib/Layer1/StochasticDescent.lean"}, {"id": "stochastic_descent_strongly_convex'", "type": "layer1", "status": "implemented", "depth": 2, "file": "Lib/Layer1/StochasticDescent.lean"}, {"id": "measurable_effGradL", "type": "glue", "status": "implemented", "depth": 1, "file": "Algorithms/WeightDecaySGD.lean"}, {"id": "unbiased_effGrad_of_unbiased", "type": "glue", "status": "implemented", "depth": 1, "file": "Algorithms/WeightDecaySGD.lean"}];
    const edgesData = [{"source": "ClippedSGD", "target": "clip_G.bounded", "type": "uses", "reason": "Algorithms/ClippedSGD.lean"}, {"source": "ClippedSGD", "target": "clip_G.measurable", "type": "uses", "reason": "Algorithms/ClippedSGD.lean"}, {"source": "ClippedSGD", "target": "norm_sq_sgd_step", "type": "uses", "reason": "Lib/Glue/Algebra.lean"}, {"source": "ClippedSGD", "target": "sgdProcess_indepFun_xi", "type": "uses", "reason": "Main.lean"}, {"source": "ClippedSGD", "target": "sgdProcess_measurable", "type": "uses", "reason": "Main.lean"}, {"source": "ClippedSGD", "target": "hasBoundedVariance_of_pointwise_bound", "type": "uses", "reason": "Lib/Glue/Probability.lean"}, {"source": "ClippedSGD", "target": "expectation_norm_sq_gradL_bound", "type": "uses", "reason": "Lib/Layer0/IndepExpect.lean"}, {"source": "ClippedSGD", "target": "convex_inner_lower_bound", "type": "uses", "reason": "Lib/Layer0/ConvexFOC.lean"}, {"source": "ClippedSGD", "target": "integral_inner", "type": "uses", "reason": "Mathlib.MeasureTheory.Integral.Bochner.Basic"}, {"source": "ClippedSGD", "target": "integral_mono", "type": "uses", "reason": "Mathlib.MeasureTheory.Integral.Bochner.Basic"}, {"source": "ClippedSGD", "target": "Finset.sum_range_sub", "type": "uses", "reason": "Mathlib.Data.Finset.Basic"}, {"source": "SubgradientMethod", "target": "sgdProcess", "type": "uses", "reason": "Main.lean"}, {"source": "SubgradientMethod", "target": "sgdProcess_measurable", "type": "uses", "reason": "Main.lean"}, {"source": "SubgradientMethod", "target": "sgdProcess_indepFun_xi", "type": "uses", "reason": "Main.lean"}, {"source": "SubgradientMethod", "target": "norm_sq_sgd_step", "type": "uses", "reason": "Lib/Glue/Algebra.lean"}, {"source": "SubgradientMethod", "target": "expectation_norm_sq_gradL_bound", "type": "uses", "reason": "Lib/Layer0/IndepExpect.lean"}, {"source": "SubgradientMethod", "target": "integrable_norm_sq_iterate_comp", "type": "uses", "reason": "Lib/Glue/Measurable.lean"}, {"source": "SubgradientMethod", "target": "hasBoundedVariance_of_pointwise_bound", "type": "uses", "reason": "Lib/Glue/Probability.lean"}, {"source": "SubgradientMethod", "target": "mem_subdifferential_iff", "type": "uses", "reason": "Mathlib"}, {"source": "SubgradientMethod", "target": "Field", "type": "uses", "reason": "Type"}, {"source": "SubgradientMethod", "target": "P", "type": "uses", "reason": "Measure Ω"}, {"source": "SubgradientMethod", "target": "hP", "type": "uses", "reason": "IsProbabilityMeasure P"}, {"source": "SubgradientMethod", "target": "ν", "type": "uses", "reason": "Measure S"}, {"source": "SubgradientMethod", "target": "wt", "type": "uses", "reason": "Ω → E"}, {"source": "SubgradientMethod", "target": "ξt", "type": "uses", "reason": "Ω → S"}, {"source": "SubgradientMethod", "target": "gradL", "type": "uses", "reason": "E → S → E"}, {"source": "SubgradientMethod", "target": "gradF", "type": "uses", "reason": "E → E"}, {"source": "SubgradientMethod", "target": "η", "type": "uses", "reason": "ℝ"}, {"source": "SubgradientMethod", "target": "h_indep", "type": "uses", "reason": "IndepFun wt ξt P"}, {"source": "SubgradientMethod", "target": "h_dist", "type": "uses", "reason": "Mea"}, {"source": "WeightDecaySGD", "target": "effectiveSGDSetup` reframe", "type": "uses", "reason": "Algorithms/WeightDecaySGD.lean"}, {"source": "WeightDecaySGD", "target": "sgd_convergence_nonconvex_v2", "type": "uses", "reason": "Algorithms/SGD.lean"}, {"source": "WeightDecaySGD", "target": "sgd_convergence_convex_v2", "type": "uses", "reason": "Algorithms/SGD.lean"}, {"source": "WeightDecaySGD", "target": "sgd_convergence_strongly_convex_v2", "type": "uses", "reason": "Algorithms/SGD.lean"}, {"source": "WeightDecaySGD", "target": "sgd_to_hyps", "type": "uses", "reason": "Algorithms/SGD.lean"}, {"source": "WeightDecaySGD", "target": "stochastic_descent_nonconvex'", "type": "uses", "reason": "Lib/Layer1/StochasticDescent.lean"}, {"source": "WeightDecaySGD", "target": "stochastic_descent_convex'", "type": "uses", "reason": "Lib/Layer1/StochasticDescent.lean"}, {"source": "WeightDecaySGD", "target": "stochastic_descent_strongly_convex'", "type": "uses", "reason": "Lib/Layer1/StochasticDescent.lean"}, {"source": "WeightDecaySGD", "target": "measurable_effGradL", "type": "uses", "reason": "Algorithms/WeightDecaySGD.lean"}, {"source": "WeightDecaySGD", "target": "unbiased_effGrad_of_unbiased", "type": "uses", "reason": "Algorithms/WeightDecaySGD.lean"}, {"source": "ProjectedGD", "target": "stochastic_descent_convex'", "type": "uses", "reason": "Lib/Layer1/StochasticDescent.lean"}, {"source": "ProjectedGD", "target": "expectation_inner_gradL_eq", "type": "uses", "reason": "Lib/Layer0/IndepExpect.lean"}, {"source": "ProjectedGD", "target": "expectation_norm_sq_gradL_bound", "type": "uses", "reason": "Lib/Layer0/IndepExpect.lean"}, {"source": "ProjectedGD", "target": "convex_inner_lower_bound", "type": "uses", "reason": "Lib/Layer0/ConvexFOC.lean"}, {"source": "ProjectedGD", "target": "norm_sq_sgd_step", "type": "uses", "reason": "Lib/Glue/Algebra.lean"}, {"source": "ProjectedGD", "target": "integrable_norm_sq_of_bounded_var", "type": "uses", "reason": "Lib/Glue/Probability.lean"}, {"source": "ProjectedGD", "target": "integrable_inner_of_sq_integrable", "type": "uses", "reason": "Lib/Glue/Probability.lean"}, {"source": "ProjectedGD", "target": "integrable_norm_sq_iterate_comp", "type": "uses", "reason": "Lib/Glue/Measurable.lean"}, {"source": "ProjectedGD", "target": "sgdFiltration", "type": "uses", "reason": "Main.lean"}, {"source": "ProjectedGD", "target": "proj_nonexp_sq", "type": "uses", "reason": "Lib/Glue/Algebra.lean"}, {"source": "ProjectedGD", "target": "pgd_to_hyps", "type": "uses", "reason": "Algorithms/ProjectedGD.lean"}, {"source": "SVRG", "target": "effectiveSGDSetup` packaging", "type": "uses", "reason": "Algorithms/SVRG.lean"}, {"source": "SVRG", "target": "sgd_convergence_strongly_convex_v2", "type": "uses", "reason": "Algorithms/SGD.lean"}, {"source": "SVRG", "target": "sgd_to_hyps", "type": "uses", "reason": "Algorithms/SGD.lean"}, {"source": "SVRG", "target": "stochastic_descent_strongly_convex'", "type": "uses", "reason": "Lib/Layer1/StochasticDescent.lean"}, {"source": "SVRG", "target": "svrg_variance_reduction", "type": "uses", "reason": "Lib/Glue/Probability.lean"}, {"source": "SVRGOuterLoop", "target": "svrg_variance_reduction", "type": "uses", "reason": "variance reduction bound across inner loop", "status": "planned"}, {"source": "SVRGOuterLoop", "target": "sgdProcess_indepFun_xi", "type": "uses", "reason": "nested independence: snapshot independent of inner samples", "status": "planned"}];

    const nodes = nodesData.map((d, i) => ({ ...d, index: i }));
    const edges = edgesData.map(e => ({ ...e }));

    const width = 1200, height = 800;
    const svg = d3.select("#graph").append("svg").attr("width", width).attr("height", height);
    const container = svg.append("g");

    const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (e) => container.attr("transform", e.transform));
    svg.call(zoom);

    const depthScale = d3.scalePoint().domain([...new Set(nodes.map(n => n.depth))].sort((a,b)=>a-b)).range([80, height - 80]);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(edges).id(d => d.id).distance(80))
      .force("charge", d3.forceManyBody().strength(-300))
      .force("x", d3.forceX(width/2).strength(0.1))
      .force("y", d3.forceY(d => depthScale(d.depth || 0)).strength(0.3));

    const link = container.selectAll(".link")
      .data(edges)
      .join("line")
      .attr("class", d => (d.status === "planned" ? "link planned" : "link"));

    const node = container.selectAll(".node")
      .data(nodes)
      .join("rect")
      .attr("class", d => "node " + (d.type || "") + " " + (d.status || ""))
      .attr("width", 100).attr("height", 30).attr("rx", 4).attr("ry", 4)
      .attr("x", -50).attr("y", -15);

    const label = container.selectAll(".label")
      .data(nodes)
      .join("text")
      .attr("class", "label")
      .attr("text-anchor", "middle")
      .attr("fill", "#fff")
      .attr("font-size", 10)
      .text(d => d.id.length > 14 ? d.id.slice(0,11)+"…" : d.id);

    const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("display", "none");
    node.on("mouseover", (e, d) => {
      tooltip.style("display", "block")
        .html("<b>" + d.id + "</b><br>Type: " + (d.type||"") + "<br>Status: " + (d.status||"implemented") + "<br>File: " + (d.file||"-") + "<br>Depth: " + (d.depth??"-"))
        .style("left", (e.pageX + 10) + "px")
        .style("top", (e.pageY + 10) + "px");
    }).on("mouseout", () => tooltip.style("display", "none"));

    simulation.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      node.attr("x", d => d.x - 50).attr("y", d => d.y - 15);
      label.attr("x", d => d.x).attr("y", d => d.y + 4);
    });
  </script>
</body>
